<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>References — Three Flows Solutions</title>
  <meta name="description" content="A curated directory of tools, platforms and resources for e-commerce sellers and retail businesses.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="STYLE.css">
</head>
<body class="tf-app">
  <!-- Shared header injected from partials.html -->
  <div id="tf-header"></div>

  <!-- Full-bleed hero band (shared .tf-page-head): background photo under a dark
       scrim, light-on-dark text. The photo is passed per-page as
       --tf-page-head-img; the ink background-color is the fallback if it fails. -->
  <header class="tf-page-head" style="--tf-page-head-img: url('assets/images/references.jpg')">
    <div class="tf-container">
      <div class="tf-kicker">References</div>
      <h1>The Retailer's Library</h1>
      <p class="tf-prose-intro">A curated directory of tools, platforms and resources for e-commerce sellers and retail businesses.</p>
    </div>
  </header>

  <main class="tf-section">
    <div class="tf-container">
      <!-- Tab control + group panels rendered here by assets/references.js from
           references.json. Soft-fail: an absent/failed script leaves this empty
           and the page still renders (hero, header, footer). -->
      <div id="tf-ref-app" data-ref-app></div>
    </div>
  </main>

  <!-- Shared footer injected from partials.html -->
  <div id="tf-footer"></div>

  <!-- Directory renderer (segmented tabs, cream group panels, card grid,
       favicons). Separate file, vanilla JS; JS enhances, absence never breaks. -->
  <script src="assets/references.js" defer></script>

  <!-- Fetch snippet: load partials.html (relative), inject header/footer,
       mark the current nav link, and wire dropdowns + the mobile menu.
       Fails silently (no nav rather than a broken page). -->
  <script src="assets/partials.js" defer></script>
</body>
</html>
