<!--
  blog-template.html — COPY-SOURCE for new blog posts. NOT servable content.

  To create a post: copy this file to blog-<slug>.html, set data-blog-id on
  <main> to the post's blogID, fill the title / dek / date / body, and
  add a matching entry to bloglist.json. This file is NOT a post: it is excluded
  from the nav and the backlog page checklist, its data-blog-id is empty, and it
  is never listed in bloglist.json — so blog.js never treats it as a post
  despite its blog- prefix.

  Structure mirrors privacy.html: partials-injected header/footer, the
  .tf-container two-column layout with the data-toc rail, the .tf-prose measure,
  and the header divider under the meta line. The header block is adapted for
  posts (h1 → dek → publish-date meta → divider).
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post title — Three Flows Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="STYLE.css">
</head>
<body class="tf-app">
  <!-- Shared header injected from partials.html -->
  <div id="tf-header"></div>

  <main class="tf-section" data-blog-id="">
    <div class="tf-container">
      <div class="tf-prose-layout" data-toc>
      <div class="tf-prose">
        <!-- TOP NAV ROW: back-to-blogs (left) + prev/next pager (right).
             blog.js fills the pager; an absent neighbour renders muted. -->
        <div class="tf-post-topnav">
          <a href="blogs.html">← Blogs</a>
          <span class="tf-post-pager"></span>
        </div>
        <!-- POST HEADER: h1 → dek → date (divider). blog.js appends
             " · N min read" to the date meta. An optional rail image renders
             from the manifest's "image" field — never marked up here. -->
        <h1>Post title goes here</h1>
        <p class="tf-prose-intro">Dek / standfirst — one or two sentences that set up the post.</p>
        <p class="tf-meta">Month D, YYYY</p>

        <!-- POST BODY: prose only. h2 = main sections (appear in the rail),
             h3 = subsections. -->
        <p>Opening paragraph.</p>

        <h2>First section</h2>
        <p>Body paragraph.</p>

        <h2>Second section</h2>
        <p>Body paragraph.</p>
      </div>
      </div>
    </div>
  </main>

  <!-- Shared footer injected from partials.html -->
  <div id="tf-footer"></div>

  <!-- Fetch snippet: load partials.html (relative), inject header/footer,
       mark the current nav link, and wire dropdowns + the mobile menu.
       Fails silently (no nav rather than a broken page). -->
  <script src="assets/partials.js" defer></script>
  <script src="assets/toc.js"></script>
  <script src="assets/blog.js"></script>
</body>
</html>
