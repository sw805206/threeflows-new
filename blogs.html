<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes from the Field — Three Flows Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="STYLE.css">
</head>
<body class="tf-app">
  <!-- Shared header injected from partials.html -->
  <div id="tf-header"></div>

  <!-- Full-bleed hero band (shared .tf-page-head): background photo under a dark
       scrim, light-on-dark text. The photo is passed per-page as
       --tf-page-head-img; the ink background-color is the fallback if it fails.
       Decorative: a CSS background carries no alt, and the h1 is the accessible
       heading (BL-019). No --tf-page-head-pos: info-002 is an all-over flat-lay
       of book pages with no single subject, so the default `center` cover-crop
       loses nothing. -->
  <header class="tf-page-head" style="--tf-page-head-img: url('assets/images/blogs.jpg')">
    <div class="tf-container">
      <div class="tf-kicker">Resources</div>
      <h1>Notes from the Field</h1>
      <p class="tf-prose-intro">Analyses, frameworks, and field-tested thinking on supply chain, fulfillment, and retail operations.</p>
    </div>
  </header>

  <main class="tf-section">
    <div class="tf-container">
      <!-- INDEX: assets/blog.js renders the card grid here from bloglist.json
           (published only, newest first) and REPLACES the line below on a
           successful render. If the script or the manifest fails, the line
           stands — a plain message rather than a blank page. -->
      <div data-blog-index>
        <p class="tf-secondary">Posts are unavailable right now.</p>
      </div>
    </div>
  </main>

  <!-- Shared footer injected from partials.html -->
  <div id="tf-footer"></div>

  <!-- Fetch snippet: load partials.html (relative), inject header/footer,
       mark the current nav link, and wire dropdowns + the mobile menu.
       Fails silently (no nav rather than a broken page). -->
  <script src="assets/partials.js" defer></script>
  <script src="assets/blog.js"></script>
</body>
</html>
